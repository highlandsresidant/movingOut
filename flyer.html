<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moving Out Sale — Print Flyer</title>
<style>
  :root {
    --bg: #f6f4f1;
    --text: #201d1a;
    --muted: #6b6560;
    --border: #e7e2db;
    --accent: #c2592f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 48px 24px;
  }
  .sheet {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  h1 {
    font-size: 2rem;
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }
  .sub {
    color: var(--muted);
    margin: 0 0 32px;
    font-size: 1.05rem;
  }
  .qr-box {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    display: inline-block;
  }
  .qr-box img { width: 260px; height: 260px; display: block; }
  .scan {
    margin: 24px 0 0;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent);
  }
  .details {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    text-align: left;
    display: inline-block;
    font-size: 1.05rem;
    line-height: 2;
  }
  .details b { display: inline-block; min-width: 100px; }
  @media print {
    body { padding: 0; }
  }
</style>
</head>
<body>

<div class="sheet">
  <h1>🏡 Moving Out Sale</h1>
  <p class="sub">Furniture &amp; home items &middot; pickup in community only</p>

  <a class="qr-box" href="https://devvsurendra.github.io/movingOut/">
    <img src="qr-code.svg" alt="QR code linking to the furniture sale page">
  </a>

  <p class="scan">📷 Scan for photos, prices &amp; details</p>

  <div class="details">
    <div><b>📍 Location</b> _________________</div>
    <div><b>🏢 Community</b> _________________</div>
    <div><b>📱 Text Me</b> (XXX) XXX-XXXX</div>
  </div>
</div>

</body>
</html>
